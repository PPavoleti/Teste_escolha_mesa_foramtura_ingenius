<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escolha de Mesa · Engenharias UFSCar 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --ink:#1c1f26;
    --paper:#f7f4ee;
    --card:#ffffff;
    --gold:#c79a4b;
    --gold-deep:#a87d33;
    --free:#3f9d6e;
    --free-soft:#e6f4ec;
    --taken:#c75c4a;
    --taken-soft:#fbe9e5;
    --reserved:#8a8f9b;
    --line:#e3ddd0;
    --muted:#73706a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--paper);}
  body{
    font-family:'Inter',sans-serif;
    color:var(--ink);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:16px;
  }
  #root{
    width:100%;
    max-width:1100px;
    background:var(--paper);
    border-radius:16px;
    overflow:hidden;
    min-height:640px;
    display:flex;
    flex-direction:column;
    box-shadow:0 12px 40px rgba(0,0,0,.08);
  }
  .head{
    background:var(--ink);
    color:var(--paper);
    padding:20px 24px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
  }
  .head h1{
    font-family:'Fraunces',serif;
    font-weight:700;
    font-size:22px;
    margin:0;
    letter-spacing:.2px;
  }
  .head .eyebrow{
    font-size:10.5px;
    letter-spacing:1.6px;
    text-transform:uppercase;
    color:var(--gold);
    font-weight:600;
    margin:0 0 4px;
  }
  .body{display:flex;flex:1;min-height:0;}
  .mapcol{flex:1.3;padding:20px;display:flex;flex-direction:column;min-width:0;}
  .sidecol{flex:1;border-left:1px solid var(--line);padding:20px;overflow-y:auto;max-height:680px;}

  .legend{display:flex;gap:18px;margin-bottom:12px;flex-wrap:wrap;font-size:12.5px;color:var(--muted);}
  .legend span{display:inline-flex;align-items:center;gap:6px;}
  .dot{width:11px;height:11px;border-radius:3px;display:inline-block;}

  svg{width:100%;height:auto;display:block;}
  .table-shape{cursor:pointer;transition:transform .12s ease;}
  .table-shape:hover{transform:scale(1.08);}
  .table-shape.disabled{cursor:default;}
  .room-label{font-family:'Inter',sans-serif;font-size:9px;fill:var(--muted);font-weight:600;letter-spacing:.3px;}
  .room-box{fill:none;stroke:var(--line);stroke-width:1.2;}
  .table-num{font-family:'Inter',sans-serif;font-size:7.5px;font-weight:700;text-anchor:middle;dominant-baseline:central;pointer-events:none;}

  .searchwrap{margin-bottom:14px;}
  .searchwrap input{width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid var(--line);font-size:14px;background:var(--card);}
  .searchwrap input:focus{outline:none;border-color:var(--gold);}

  .progress{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:16px;}
  .progress .row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
  .progress .num{font-family:'Fraunces',serif;font-size:26px;font-weight:700;color:var(--gold-deep);}
  .progress .label{font-size:12px;color:var(--muted);}
  .bar{height:7px;background:#eee5d2;border-radius:6px;overflow:hidden;}
  .bar-fill{height:100%;background:var(--gold);border-radius:6px;transition:width .3s ease;}

  .plist{list-style:none;margin:0;padding:0;}
  .prow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;border-radius:10px;margin-bottom:6px;background:var(--card);border:1px solid var(--line);cursor:pointer;}
  .prow:hover{border-color:var(--gold);}
  .prow.assigned{background:var(--free-soft);}
  .prow .pname{font-size:13.5px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .badge{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:6px;white-space:nowrap;}
  .badge.tipo8{background:#eef1f5;color:#566;}
  .badge.tipo10{background:#fdeccb;color:var(--gold-deep);}
  .badge.tipo12{background:#e7e2f5;color:#5a4a8a;}
  .badge.mesa{background:var(--ink);color:var(--paper);}
  .badge.multi{background:#fff3b0;color:#7a6300;}

  .panel-title{font-family:'Fraunces',serif;font-weight:700;font-size:16px;margin:0 0 12px;}

  .modal-overlay{position:fixed;inset:0;background:rgba(20,20,20,.55);display:flex;align-items:center;justify-content:center;z-index:50;}
  .modal{background:var(--card);border-radius:16px;padding:24px;width:min(420px,90%);box-shadow:0 20px 50px rgba(0,0,0,.3);}
  .modal h3{font-family:'Fraunces',serif;margin:0 0 4px;font-size:19px;}
  .modal p.sub{color:var(--muted);font-size:13px;margin:0 0 18px;}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:6px;}
  .btn{border:none;padding:10px 18px;border-radius:9px;font-weight:600;font-size:13.5px;cursor:pointer;font-family:'Inter',sans-serif;}
  .btn:hover{opacity:.85;}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .btn-primary{background:var(--ink);color:var(--paper);}
  .btn-ghost{background:transparent;color:var(--muted);}
  .btn-danger{background:var(--taken);color:#fff;}
  .btn-gold{background:var(--gold);color:var(--ink);}

  .empty{color:var(--muted);font-size:13px;text-align:center;padding:30px 10px;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:12px 20px;border-radius:10px;font-size:13.5px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:60;max-width:90%;text-align:center;}
  .topactions{display:flex;gap:8px;align-items:center;}
  .iconbtn{background:rgba(255,255,255,.1);border:none;color:var(--paper);width:34px;height:34px;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .iconbtn:hover{background:rgba(255,255,255,.2);}
  .who-banner{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:16px;}
  .who-banner .role{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--gold-deep);font-weight:700;margin-bottom:6px;}
  .small{font-size:11.5px;color:var(--muted);margin-top:6px;}
  .loadingscreen{display:flex;align-items:center;justify-content:center;min-height:400px;color:var(--muted);font-size:14px;flex-direction:column;gap:10px;}
  .spinner{width:28px;height:28px;border:3px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:#ddd5c2;border-radius:4px;}

  @media (max-width:760px){
    .body{flex-direction:column;}
    .sidecol{border-left:none;border-top:1px solid var(--line);max-height:none;}
  }
</style>
</head>
